<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanji | | Profile | Flor's Canteen</title>
    <link rel="stylesheet" href="./css/adminview.css">
    <link rel="stylesheet" href="./css/profile.css">
</head>

<body>
    <div class="dashboard-container">
       <aside class="sidebar">
            <div class="logo-section">
                <img src="./css/LOGO(2).png" alt="Logo">
                <span>Flor's Canteen</span>
            </div>
            <nav class="nav-links">
                <a href="AdminDasboard.html" class="active">
                    <img src="./picture/shield.png" alt="Dashboard" class="nav-icon-img">
                    Admin Dashboard
                </a>
                <a href="AdminProductSetting.html">
                    <img src="./picture/faders.png" alt="Settings" class="nav-icon-img">
                    Product Setting
                </a>
                <div class="nav-spacer"></div>
                <a href="AdminProfile.html">
                    <img src="./picture/user.png" alt="Profile" class="nav-icon-img">
                    Profile
                </a>
                <a href="login.html">
                    <img src="./picture/sign-out.png" alt="Logout" class="nav-icon-img">
                    Log Out
                </a>
            </nav>
            <div class="sidebar-help">
                <a href="#">
                    <img src="./picture/question.png" alt="Help" class="nav-icon-img">
                    Help
                </a>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="welcome-text">
                    <p>Welcome Back, Sanji</p>
                    <h1>Your Profile Settings</h1>
                </div>
                <div class="header-actions">
                    <div class="profile-pill">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGvoqSOw70hK13-Jc7asehhnVKVbEM5vpKBw&s"
                            id="header-avatar" alt="User">
                        <span>Sanji <h6>@staff</h6></span>
                    </div>
                     <button class="icon-btn" title="Notifications">
                        <img src="./picture/bell.png" alt="Bell Icon" class="btn-icon-img">
                    </button>
                    <button class="icon-btn" title="Messages">
                        <img src="./picture/chat.png" alt="Chat Icon" class="btn-icon-img">
                    </button>

                    <button class="icon-btn theme-toggle" title="Toggle Dark Mode">
                        <img src="./picture/moon.png" alt="Moon Icon" class="btn-icon-img">
                    </button>
                </div>
            </header>

            <section class="profile-container">
                <div class="profile-card">
                    <form class="profile-form">
                        <div class="avatar-edit-section">
                            <div class="avatar-wrapper">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alfredo" id="profile-display"
                                    alt="Profile Picture">
                                <label for="image-input" class="edit-icon">
                                    <i class="ph ph-pencil-simple"></i>
                                </label>
                                <input type="file" id="image-input" accept="image/*" hidden
                                    onchange="updatePreview(this)">
                            </div>
                            <div class="avatar-info">
                                <h3>Your Profile Picture</h3>
                                <p>Change your avatar for your account</p>
                            </div>
                        </div>

                        <hr class="divider">
                        <div class="form-grid">
                            <div class="form-field">
                                <label><i class="ph ph-user"></i> Full Name</label>
                                <input type="text" value="Sanji">
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-at"></i> Username</label>
                                <input type="text" value="admin">
                            </div>


                            <div class="form-field">
                                <label><i class="ph ph-phone"></i> Cellphone Number</label>
                                <input type="tel" placeholder="+63 9XX XXX XXXX" value="+63 912 345 8989">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-flag"></i> Nationality</label>
                                <input type="text" value="Filipino">
                            </div>


                            <div class="form-field">
                                <label><i class="ph ph-envelope"></i> Email Address</label>
                                <input type="email" value="sanji@gg.com">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-gender-intersex"></i> Gender</label>
                                <select class="form-input-style">
                                    <option value="male" selected>Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-calendar"></i> Age</label>
                                <input type="number" value="26">
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-cake"></i> Birthday</label>
                                <input type="date" value="1999-05-20">
                            </div>
                            <div class="form-field" style="grid-column: span 2;">
                                <label><i class="ph ph-map-pin"></i> Address</label>
                                <input type="text" value="123 Canteen St, Meycauayan, Bulacan"
                                    placeholder="Enter complete home address">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-briefcase"></i> Role</label>
                                <input type="text" value="Staff" readonly class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-activity"></i> Account Status</label>
                                <div class="select-wrapper">
                                    <select id="accountStatus" class="form-input-style">
                                        <option value="new" selected>New</option>
                                        <option value="active">Active</option>
                                        <option value="inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-calendar-plus"></i> Account Created</label>
                                <input type="text" value="April 08, 2026" readonly class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-briefcase"></i> Since Employee</label>
                                <input type="text" value="March 2024" placeholder="Month, Year" readonly
                                    class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label for="currentPassword">Current Password</label>
                                <input type="text" id="currentPassword" name="currentPassword" value="admin123">
                            </div>

                            <div class="form-field">
                                <label for="newPassword">New Password</label>
                                <input type="text" id="newPassword" name="newPassword" value="admin123">
                            </div>
                        </div>
                        <div class="profile-actions">
                            <button type="button" class="btn-cancel">Reset</button>
                            <button type="submit" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </section>
            <footer class="dashboard-footer">
                <p>&copy; 2026 Flor's Canteen | All rights reserved | Designed by Romelisa Patricia T. Castor</p>
            </footer>
        </main>

    </div>

</body>
<script src="./js/theme.js"></script>


</html>
