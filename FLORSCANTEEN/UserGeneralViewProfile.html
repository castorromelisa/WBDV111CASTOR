<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flor's Canteen | Profile</title>
    <link rel="stylesheet" href="./css/UserView.css">
    <link rel="stylesheet" href="./css/profile.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="./css/LOGO(2).png" alt="Logo">
                <span>Flor's Canteen</span>
            </div>
            <nav class="nav-links">
                <a href="UserGeneralViewMenu.html">
                    <i class="ph ph-bowl-food"></i> Menu
                </a>
                <a href="UserGeneralViewOrder.html">
                    <i class="ph ph-shopping-cart-simple"></i> Order
                </a>
                <a href="UserGeneralViewHistoryOrder.html">
                    <i class="ph ph-clock-counter-clockwise"></i> Order History
                </a>
                <a href="UserGeneralViewFeedback.html">
                    <i class="ph ph-chat-teardrop-dots"></i> Feedback
                </a>
                <div class="nav-spacer"></div>
                <a href="UserGeneralViewProfile.html" class="active"><i class="ph ph-user"></i> Profile</a>
                <a href="login.html"><i class="ph ph-sign-out"></i> Log Out</a>
            </nav>
            <div class="sidebar-help">
                <a href="#"><i class="ph ph-question"></i> Help</a>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="welcome-text">
                    <p>Welcome Back, Fiona Frost</p>
                    <h1>Your Profile Settings</h1>
                </div>
                <div class="header-actions">
                    <div class="profile-pill">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alfredo" id="header-avatar"
                            alt="User">
                        <span>Fiona Frost <p>@user</p></span>
                    </div>
                    <button class="icon-btn"><i class="ph ph-bell"></i></button>
                    <button class="icon-btn"><i class="ph ph-magnifying-glass"></i></button>
                    <button class="icon-btn"><i class="ph ph-list"></i></button>
                    <button class="icon-btn theme-toggle"><i class="ph ph-moon"></i></button>
                </div>
            </header>

            <section class="profile-container">
                <div class="profile-card">
                    <form class="profile-form">
                        <div class="avatar-edit-section">
                            <div class="avatar-wrapper">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alfredo" id="profile-display"
                                    alt="Profile Picture">
                                <label for="image-input" class="edit-icon">
                                    <i class="ph ph-pencil-simple"></i>
                                </label>
                                <input type="file" id="image-input" accept="image/*" hidden
                                    onchange="updatePreview(this)">
                            </div>
                            <div class="avatar-info">
                                <h3>Your Profile Picture</h3>
                                <p>Change your avatar for your account</p>
                            </div>
                        </div>

                        <hr class="divider">

                        <div class="form-grid">
                            <div class="form-field">
                                <label><i class="ph ph-user"></i> Full Name</label>
                                <input type="text" value="Fiona Frost">
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-at"></i> Username</label>
                                <input type="text" value="user">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-phone"></i> Cellphone Number</label>
                                <input type="tel" placeholder="+63 9XX XXX XXXX" value="+63 912 345 8989">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-flag"></i> Nationality</label>
                                <input type="text" value="Filipino">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-envelope"></i> Email Address</label>
                                <input type="email" value="ffrost@gg.com">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-gender-intersex"></i> Gender</label>
                                <select class="form-input-style">
                                    <option value="male">Male</option>
                                    <option value="female" selected>Female</option>
                                </select>
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-calendar"></i> Age</label>
                                <input type="number" value="26">
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-cake"></i> Birthday</label>
                                <input type="date" value="1999-05-20">
                            </div>
                            <div class="form-field" style="grid-column: span 2;">
                                <label><i class="ph ph-map-pin"></i> Address</label>
                                <input type="text" value="#35 Banez St, Meycauayan, Bulacan"
                                    placeholder="Enter complete home address">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-briefcase"></i> Role</label>
                                <input type="text" value="User" readonly class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-activity"></i> Account Status</label>
                                <div class="select-wrapper">
                                    <select id="accountStatus" class="form-input-style">
                                        <option value="new" selected>New</option>
                                        <option value="active">Active</option>
                                        <option value="inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-field">
                                <label><i class="ph ph-calendar-plus"></i> Account Created</label>
                                <input type="text" value="April 28, 2026" readonly class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label><i class="ph ph-briefcase"></i> Since User</label>
                                <input type="text" value="April 28, 2026" placeholder="Month, Year" readonly
                                    class="readonly-field">
                            </div>

                            <div class="form-field">
                                <label for="currentPassword">Current Password</label>
                                <input type="text" id="currentPassword" name="currentPassword" value="user123">
                            </div>

                            <div class="form-field">
                                <label for="newPassword">New Password</label>
                                <input type="text" id="newPassword" name="newPassword" value="user123">
                            </div>
                        </div>

                        <div class="profile-actions">
                            <button type="button" class="btn-cancel">Reset</button>
                            <button type="submit" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <footer class="dashboard-footer">
        <p>&copy; 2026 Flor's Canteen | All rights reserved | Designed by Romelisa Patricia T. Castor</p>
    </footer>
</body>
<script src="./js/theme.js"></script>


</html>
